<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prompt Forge | Stable Diffusion + Избранное</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-abstract"></div>
    <div class="container">
        <header>
            <h1>✦ Prompt Forge</h1>
            <p>Генератор промтов для Stable Diffusion • Избранное</p>
            <div class="badge-group">
                <span class="badge">Stable Diffusion</span>
                <span class="badge">Избранное</span>
                <span class="badge">Gemini • Duck.ai</span>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="generator">✨ Генератор</button>
            <button class="tab-btn" data-tab="favourites">⭐ Избранное</button>
        </div>

        <!-- ВКЛАДКА ГЕНЕРАТОРА -->
        <div class="tab-content active" id="generator-tab">
            <div class="input-group">
                <label for="photo-idea">💡 Ваша идея / ключевые слова</label>
                <input type="text" id="photo-idea" placeholder="Например: киберпанк-кот в дождливом городе, неон, отражения">
            </div>
            <div class="settings-panel">
                <h3>⚙️ Параметры генерации</h3>
                <div class="settings-grid">
                    <div class="setting">
                        <label>Соотношение сторон</label>
                        <select id="photo-ratio">
                            <option value="1:1">1:1 (квадрат)</option>
                            <option value="16:9">16:9 (широкий)</option>
                            <option value="9:16">9:16 (вертикальный)</option>
                            <option value="4:3">4:3 (классика)</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>Стиль</label>
                        <select id="photo-style">
                            <option value="photorealistic">Фотореализм</option>
                            <option value="anime">Аниме / манга</option>
                            <option value="cyberpunk">Киберпанк</option>
                            <option value="fantasy">Фэнтези</option>
                            <option value="oil painting">Масляная живопись</option>
                            <option value="cinematic">Кинематографичный</option>
                        </select>
                    </div>
                    <div class="setting full-width">
                        <label>Negative prompt (что исключить)</label>
                        <input type="text" id="photo-negative" placeholder="например: blurry, ugly, deformed, watermark">
                    </div>
                </div>
            </div>
            <div class="action-bar">
                <button id="generate-photo" class="btn-primary">✨ Сгенерировать промт</button>
                <button id="random-photo" class="btn-secondary">🎲 Случайный промт дня</button>
            </div>
        </div>

        <!-- ВКЛАДКА ИЗБРАННОЕ (только просмотр и удаление) -->
        <div class="tab-content" id="favourites-tab">
            <div class="favourites-header">
                <h3>❤️ Сохранённые промты</h3>
                <button id="clear-all-favs" class="clear-favs-btn">Очистить всё</button>
            </div>
            <div id="favourites-list" class="favourites-list">
                <div class="empty-fav">Нет избранных промтов. Нажмите ☆ на сгенерированном промте.</div>
            </div>
        </div>

        <!-- ОБЩАЯ КАРТОЧКА РЕЗУЛЬТАТА (видна в обеих вкладках) -->
        <div class="result-card">
            <div class="result-header">
                <h3>📋 Текущий промт</h3>
                <div class="result-actions">
                    <button id="copy-btn" class="icon-btn" title="Копировать">📋</button>
                    <button id="export-btn" class="icon-btn" title="Экспорт в .txt">💾</button>
                    <button id="save-fav-btn" class="icon-btn fav-star" title="Сохранить в избранное">☆</button>
                </div>
            </div>
            <div id="prompt-output" class="prompt-output">
                Здесь появится ваш промт...
            </div>
            <div id="external-links" class="external-links"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
