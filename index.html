<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prompt Forge | Stable Diffusion + Избранное + Тема</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #0a0a0f;
            --text-primary: #ededf0;
            --text-secondary: #b0b0c0;
            --card-bg: rgba(8, 8, 18, 0.7);
            --panel-bg: rgba(15, 15, 25, 0.6);
            --input-bg: rgba(20, 20, 35, 0.7);
            --input-border: rgba(150, 130, 220, 0.4);
            --border-glow: rgba(150, 130, 250, 0.4);
            --btn-primary-bg: linear-gradient(100deg, #6c5ce7, #4a42c2);
            --btn-secondary-bg: rgba(255, 255, 255, 0.08);
            --btn-secondary-border: rgba(150, 130, 220, 0.5);
            --badge-bg: rgba(100, 100, 180, 0.2);
            --badge-border: rgba(180, 160, 255, 0.3);
            --prompt-bg: #0b0b12;
            --prompt-border: #2a2a38;
            --fav-item-bg: rgba(25, 25, 40, 0.7);
            --fav-type-bg: #2a2360;
            --scrollbar-thumb: #4a3f9e;
        }

        [data-theme="light"] {
            --bg-body: #f5f3ff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --card-bg: rgba(255, 255, 255, 0.85);
            --panel-bg: rgba(245, 240, 255, 0.8);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(100, 80, 200, 0.4);
            --border-glow: rgba(100, 80, 200, 0.5);
            --btn-primary-bg: linear-gradient(100deg, #5a4ad7, #3a32a2);
            --btn-secondary-bg: rgba(0, 0, 0, 0.05);
            --btn-secondary-border: rgba(100, 80, 200, 0.5);
            --badge-bg: rgba(100, 80, 200, 0.15);
            --badge-border: rgba(100, 80, 200, 0.4);
            --prompt-bg: #ffffff;
            --prompt-border: #ddd6fe;
            --fav-item-bg: rgba(255, 255, 255, 0.8);
            --fav-type-bg: #e0d6ff;
            --scrollbar-thumb: #a78bfa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
        }

        .bg-abstract {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, rgba(80, 70, 180, 0.2) 0%, rgba(20, 15, 45, 0.9) 70%);
        }
        [data-theme="light"] .bg-abstract {
            background: radial-gradient(circle at 30% 40%, rgba(200, 180, 255, 0.3) 0%, rgba(240, 235, 255, 0.9) 70%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1.5rem 1.8rem 3rem;
            position: relative;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .title-area {
            text-align: left;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #B6A9FF 50%, #77AAFF 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin: 0;
        }
        [data-theme="light"] h1 {
            background: linear-gradient(135deg, #2d2d5e 0%, #5a4ad7 50%, #8b5cf6 100%);
            background-clip: text;
            -webkit-background-clip: text;
        }
        .theme-toggle {
            background: var(--badge-bg);
            border: 1px solid var(--badge-border);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-primary);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin: 1rem 0 1.5rem;
        }
        [data-theme="light"] .tabs {
            border-bottom-color: rgba(0, 0, 0, 0.1);
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.8rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            border-radius: 40px 40px 0 0;
            font-family: inherit;
        }
        .tab-btn.active {
            color: var(--text-primary);
            background: linear-gradient(0deg, rgba(100, 100, 220, 0.3), transparent);
            border-bottom: 2px solid #9b7eff;
        }
        .tab-content {
            display: none;
            animation: fade 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .input-group {
            margin-bottom: 1.8rem;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #b38eff;
            box-shadow: 0 0 0 2px rgba(150, 100, 255, 0.3);
        }

        .settings-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--badge-border);
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .setting.full-width {
            grid-column: span 2;
        }
        @media (max-width: 700px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .setting.full-width {
                grid-column: span 1;
            }
        }

        .action-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .btn-primary, .btn-secondary {
            padding: 0.75rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--btn-primary-bg);
            color: white;
            box-shadow: 0 2px 12px rgba(100, 80, 200, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-secondary {
            background: var(--btn-secondary-bg);
            border: 1px solid var(--btn-secondary-border);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: rgba(150, 130, 220, 0.2);
            transform: translateY(-2px);
        }

        .result-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.4rem 1.8rem;
            border: 1px solid var(--border-glow);
            margin-top: 1.5rem;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            border-bottom: 1px dashed var(--badge-border);
            padding-bottom: 0.6rem;
        }
        .result-actions {
            display: flex;
            gap: 0.8rem;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .icon-btn:hover {
            transform: scale(1.1);
        }
        .fav-star.active-star {
            color: gold;
            text-shadow: 0 0 3px orange;
        }
        .prompt-output {
            background: var(--prompt-bg);
            padding: 1.4rem;
            border-radius: 24px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.9rem;
            border: 1px solid var(--prompt-border);
            color: var(--text-primary);
            min-height: 130px;
        }
        .external-links {
            margin-top: 1.2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            border-top: 1px solid var(--badge-border);
            padding-top: 1rem;
        }
        .external-link-btn {
            background: var(--badge-bg);
            border: 1px solid var(--badge-border);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }
        .external-link-btn:hover {
            background: rgba(150, 130, 220, 0.4);
            transform: translateY(-2px);
        }

        .favourites-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .clear-favs-btn {
            background: rgba(220, 60, 60, 0.2);
            border: 1px solid rgba(255, 80, 80, 0.5);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            color: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .favourites-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .fav-item {
            background: var(--fav-item-bg);
            border: 1px solid var(--badge-border);
            border-radius: 24px;
            padding: 1rem;
        }
        .fav-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .fav-type {
            background: var(--fav-type-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-weight: 600;
        }
        .fav-text {
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }
        .fav-actions {
            display: flex;
            gap: 0.6rem;
            justify-content: flex-end;
        }
        .fav-use-btn, .fav-delete-btn {
            background: none;
            border: none;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .fav-use-btn {
            background: #4a3f9e;
            color: white;
        }
        .fav-delete-btn {
            background: rgba(180, 60, 60, 0.4);
            color: #ffbaba;
        }
        .empty-fav {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
            font-style: italic;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            h1 { font-size: 2rem; }
            .tabs { justify-content: center; }
            .header-row { flex-direction: column; align-items: stretch; text-align: center; }
            .title-area { text-align: center; }
            .theme-toggle { align-self: center; }
        }
    </style>
</head>
<body data-theme="dark">
<div class="bg-abstract"></div>
<div class="container">
    <div class="header-row">
        <div class="title-area">
            <h1>✦ Prompt Forge</h1>
        </div>
        <button id="theme-toggle" class="theme-toggle" title="Сменить тему">🌙</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="generator">✨ Генератор</button>
        <button class="tab-btn" data-tab="favourites">⭐ Избранное</button>
    </div>

    <div class="tab-content active" id="generator-tab">
        <div class="input-group">
            <label>💡 Ваша идея / ключевые слова</label>
            <input type="text" id="photo-idea" placeholder="Например: киберпанк-кот в дождливом городе">
        </div>
        <div class="settings-panel">
            <h3>⚙️ Параметры</h3>
            <div class="settings-grid">
                <div class="setting">
                    <label>Соотношение сторон</label>
                    <select id="photo-ratio">
                        <option value="1:1">1:1 (квадрат)</option>
                        <option value="16:9">16:9 (широкий)</option>
                        <option value="9:16">9:16 (вертикальный)</option>
                        <option value="4:3">4:3 (классика)</option>
                    </select>
                </div>
                <div class="setting">
                    <label>Стиль</label>
                    <select id="photo-style">
                        <option value="photorealistic">Фотореализм</option>
                        <option value="anime">Аниме</option>
                        <option value="cyberpunk">Киберпанк</option>
                        <option value="fantasy">Фэнтези</option>
                        <option value="oil painting">Масляная живопись</option>
                        <option value="cinematic">Кинематографичный</option>
                    </select>
                </div>
                <div class="setting full-width">
                    <label>Negative prompt</label>
                    <input type="text" id="photo-negative" placeholder="blurry, ugly, deformed, watermark">
                </div>
            </div>
        </div>
        <div class="action-bar">
            <button id="generate-photo" class="btn-primary">✨ Сгенерировать</button>
            <button id="random-photo" class="btn-secondary">🎲 Случайный промт</button>
        </div>
    </div>

    <div class="tab-content" id="favourites-tab">
        <div class="favourites-header">
            <h3>❤️ Сохранённые промты</h3>
            <button id="clear-all-favs" class="clear-favs-btn">Очистить всё</button>
        </div>
        <div id="favourites-list" class="favourites-list">
            <div class="empty-fav">Нет избранных промтов. Нажмите ☆ на промте.</div>
        </div>
    </div>

    <div class="result-card">
        <div class="result-header">
            <h3>📋 Текущий промт</h3>
            <div class="result-actions">
                <button id="copy-btn" class="icon-btn" title="Копировать">📋</button>
                <button id="export-btn" class="icon-btn" title="Экспорт .txt">💾</button>
                <button id="save-fav-btn" class="icon-btn fav-star" title="В избранное">☆</button>
            </div>
        </div>
        <div id="prompt-output" class="prompt-output">✨ Сгенерируйте промт</div>
        <div id="external-links" class="external-links"></div>
    </div>
</div>

<script>
    // ========== DOM Elements ==========
    const photoIdea = document.getElementById('photo-idea');
    const photoRatio = document.getElementById('photo-ratio');
    const photoStyle = document.getElementById('photo-style');
    const photoNegative = document.getElementById('photo-negative');
    const generateBtn = document.getElementById('generate-photo');
    const randomBtn = document.getElementById('random-photo');
    const promptOutput = document.getElementById('prompt-output');
    const copyBtn = document.getElementById('copy-btn');
    const exportBtn = document.getElementById('export-btn');
    const saveFavBtn = document.getElementById('save-fav-btn');
    const externalLinksDiv = document.getElementById('external-links');
    const favouritesListDiv = document.getElementById('favourites-list');
    const clearAllFavsBtn = document.getElementById('clear-all-favs');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    const themeToggle = document.getElementById('theme-toggle');

    let currentPromptText = "";
    let favourites = [];

    // ========== Prompt Builder ==========
    function buildSDPrompt(idea, style, ratio, negative) {
        let ratioDesc = '';
        switch(ratio) {
            case '1:1': ratioDesc = 'square 1:1'; break;
            case '16:9': ratioDesc = 'cinematic 16:9'; break;
            case '9:16': ratioDesc = 'vertical 9:16'; break;
            case '4:3': ratioDesc = 'classic 4:3'; break;
            default: ratioDesc = 'standard';
        }
        const styleMap = {
            photorealistic: 'photorealistic, 8K, detailed texture',
            anime: 'anime style, vibrant colors, crisp lines',
            cyberpunk: 'cyberpunk, neon lights, rain, reflections',
            fantasy: 'fantasy art, magical, ethereal lighting',
            'oil painting': 'oil painting, thick brushstrokes',
            cinematic: 'cinematic lighting, dramatic shadows'
        };
        const styleText = styleMap[style] || styleMap.photorealistic;
        let neg = negative.trim() ? `, negative: ${negative}` : ', negative: blurry, ugly, deformed, watermark';
        return `${idea}, ${styleText}, ${ratioDesc}, masterpiece, best quality, 8k, sharp focus${neg}`;
    }

    const randomPrompts = [
        "enchanted forest with glowing mushrooms and a mystical stag, photorealistic, 8K, cinematic lighting, 16:9, negative: blurry",
        "cyberpunk samurai standing on a neon rooftop, rain, anime style, 4K, dramatic shadows",
        "astronaut riding a horse on Mars, dramatic sunset, oil painting, masterpiece",
        "steampunk airship above Victorian London, fantasy art, detailed engines, golden hour",
        "underwater library with bioluminescent jellyfish, dreamy, 9:16, high detail"
    ];

    function generatePrompt() {
        let idea = photoIdea.value.trim() || "abstract composition with soft shapes";
        const ratio = photoRatio.value;
        const style = photoStyle.value;
        const negative = photoNegative.value;
        const prompt = buildSDPrompt(idea, style, ratio, negative);
        currentPromptText = prompt;
        promptOutput.innerText = prompt;
        updateExternalLinks();
        syncStarIcon();
    }

    function setRandomPrompt() {
        const idx = Math.floor(Math.random() * randomPrompts.length);
        currentPromptText = randomPrompts[idx];
        promptOutput.innerText = currentPromptText;
        updateExternalLinks();
        photoIdea.value = "✨ случайная идея";
        syncStarIcon();
    }

    // ========== Внешние ссылки ==========
    function updateExternalLinks() {
        if (!currentPromptText || currentPromptText === '✨ Сгенерируйте промт') {
            externalLinksDiv.innerHTML = '';
            return;
        }
        externalLinksDiv.innerHTML = `
            <a href="https://duck.ai/" target="_blank" class="external-link-btn">🦆 Duck.ai</a>
            <a href="https://gemini.google.com/" target="_blank" class="external-link-btn">✨ Google Gemini</a>
            <span class="external-link-btn" style="background:none; border-color:#6c5ce7;">💡 Скопируйте промт</span>
        `;
    }

    // ========== Избранное ==========
    function loadFavs() {
        const stored = localStorage.getItem('prompt_forge_favs');
        if (stored) {
            try { favourites = JSON.parse(stored); } catch(e) { favourites = []; }
        } else { favourites = []; }
        renderFavs();
    }
    function saveFavs() {
        localStorage.setItem('prompt_forge_favs', JSON.stringify(favourites));
        renderFavs();
    }
    function addToFavourites() {
        if (!currentPromptText || currentPromptText === '✨ Сгенерируйте промт') {
            promptOutput.innerText = "❌ Нет промта для сохранения";
            setTimeout(() => promptOutput.innerText = currentPromptText, 1200);
            return;
        }
        if (favourites.some(f => f.text === currentPromptText)) {
            promptOutput.innerText = "⚠️ Уже в избранном";
            setTimeout(() => promptOutput.innerText = currentPromptText, 1200);
            return;
        }
        favourites.unshift({ id: Date.now(), text: currentPromptText, date: new Date().toLocaleString() });
        saveFavs();
        syncStarIcon();
        promptOutput.innerText = "✅ Сохранено!";
        setTimeout(() => promptOutput.innerText = currentPromptText, 1200);
    }
    function deleteFav(id) {
        favourites = favourites.filter(f => f.id !== id);
        saveFavs();
        syncStarIcon();
    }
    function useFav(fav) {
        currentPromptText = fav.text;
        promptOutput.innerText = fav.text;
        updateExternalLinks();
        syncStarIcon();
        switchTab('generator');
    }
    function clearAllFavs() {
        if (confirm('Удалить всё избранное?')) {
            favourites = [];
            saveFavs();
            syncStarIcon();
        }
    }
    function renderFavs() {
        if (!favouritesListDiv) return;
        if (favourites.length === 0) {
            favouritesListDiv.innerHTML = '<div class="empty-fav">⭐ Нет избранных промтов. Нажмите ☆ на промте.</div>';
            return;
        }
        let html = '';
        favourites.forEach(fav => {
            html += `
                <div class="fav-item">
                    <div class="fav-header">
                        <span class="fav-type">📸 Stable Diffusion</span>
                        <span class="fav-date">${escapeHtml(fav.date)}</span>
                    </div>
                    <div class="fav-text">${escapeHtml(fav.text.substring(0, 260))}${fav.text.length > 260 ? '…' : ''}</div>
                    <div class="fav-actions">
                        <button class="fav-use-btn" data-id="${fav.id}">Использовать</button>
                        <button class="fav-delete-btn" data-id="${fav.id}">🗑 Удалить</button>
                    </div>
                </div>
            `;
        });
        favouritesListDiv.innerHTML = html;
        document.querySelectorAll('.fav-use-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const fav = favourites.find(f => f.id === id);
                if (fav) useFav(fav);
            });
        });
        document.querySelectorAll('.fav-delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                deleteFav(id);
            });
        });
    }
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function syncStarIcon() {
        if (!currentPromptText || currentPromptText === '✨ Сгенерируйте промт') {
            saveFavBtn.innerHTML = '☆';
            saveFavBtn.classList.remove('active-star');
            return;
        }
        const exists = favourites.some(f => f.text === currentPromptText);
        if (exists) {
            saveFavBtn.innerHTML = '★';
            saveFavBtn.classList.add('active-star');
        } else {
            saveFavBtn.innerHTML = '☆';
            saveFavBtn.classList.remove('active-star');
        }
    }

    // ========== Табы ==========
    function switchTab(tabId) {
        tabBtns.forEach(btn => {
            if (btn.dataset.tab === tabId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        tabContents.forEach(content => {
            if (content.id === `${tabId}-tab`) content.classList.add('active');
            else content.classList.remove('active');
        });
    }
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // ========== Копирование / Экспорт ==========
    copyBtn.addEventListener('click', async () => {
        if (!currentPromptText || currentPromptText === '✨ Сгенерируйте промт') {
            promptOutput.innerText = '❌ Нет промта';
            setTimeout(() => promptOutput.innerText = currentPromptText || '✨ Сгенерируйте промт', 1000);
            return;
        }
        await navigator.clipboard.writeText(currentPromptText);
        const orig = promptOutput.innerText;
        promptOutput.innerText = '✅ Скопировано!';
        setTimeout(() => promptOutput.innerText = orig, 1200);
    });
    exportBtn.addEventListener('click', () => {
        if (!currentPromptText || currentPromptText === '✨ Сгенерируйте промт') return;
        const blob = new Blob([currentPromptText], {type: 'text/plain'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `prompt_${Date.now()}.txt`;
        link.click();
        URL.revokeObjectURL(link.href);
    });

    // ========== Тема ==========
    function initTheme() {
        const saved = localStorage.getItem('prompt_forge_theme');
        if (saved === 'light') {
            document.body.setAttribute('data-theme', 'light');
            themeToggle.innerHTML = '☀️';
        } else {
            document.body.setAttribute('data-theme', 'dark');
            themeToggle.innerHTML = '🌙';
        }
    }
    function toggleTheme() {
        const cur = document.body.getAttribute('data-theme');
        if (cur === 'dark') {
            document.body.setAttribute('data-theme', 'light');
            localStorage.setItem('prompt_forge_theme', 'light');
            themeToggle.innerHTML = '☀️';
        } else {
            document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('prompt_forge_theme', 'dark');
            themeToggle.innerHTML = '🌙';
        }
    }
    themeToggle.addEventListener('click', toggleTheme);

    // ========== Инициализация ==========
    generateBtn.addEventListener('click', generatePrompt);
    randomBtn.addEventListener('click', setRandomPrompt);
    saveFavBtn.addEventListener('click', addToFavourites);
    clearAllFavsBtn.addEventListener('click', clearAllFavs);
    loadFavs();
    initTheme();
    currentPromptText = "✨ Сгенерируйте промт";
    promptOutput.innerText = currentPromptText;
    updateExternalLinks();
    syncStarIcon();
</script>
</body>
</html>
